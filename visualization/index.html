<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenacious Conversion Engine Visualization</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Tenacious Conversion Engine</p>
          <h1>Current runtime evidence for the synthetic lead.</h1>
          <p class="lede">The page reads the latest runtime artifacts and trace log directly from the repository so the status surface matches the submission evidence.</p>
        </div>
        <div class="pillset">
          <span>Sink mode</span>
          <span>Local artifacts</span>
          <span>Trace-backed</span>
        </div>
      </header>

      <section class="grid">
        <article class="panel" id="summary"></article>
        <article class="panel" id="signals"></article>
        <article class="panel" id="ops"></article>
        <article class="panel" id="traces"></article>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
